<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media for Marketing: RETRO CLASSIC PREP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-nightlife: #0C0922;
    --panel-nightlife: #1C1859;
    --velvety: #cb6435;
    --lingonberries: #8B0535;
    --hot-pink: #F10393;
    --light-magenta: #FE6EF0;
    --retro-blue: #ffa001;
    --neon-green: #39ff14;
    --neon-red: #ff3131;
    --gold: #FFD700;
    --text-white: #FFFFFF;
    --text-soft: #E2E8F0;
    
    --pixel-border: 4px solid var(--light-magenta);
    --pixel-border-gold: 4px solid var(--gold);
    --pixel-border-green: 4px solid var(--neon-green);
    --pixel-border-red: 4px solid var(--neon-red);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  
  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background-color: var(--bg-nightlife);
    color: var(--text-white);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: 
      radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
      radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 20px);
    background-size: 450px 450px, 250px 250px;
    background-attachment: fixed;
  }
  
  /* Retro arcade badge font only for small labels */
  .retro-font {
    font-family: 'Press Start 2P', monospace;
    line-height: 1.5;
    letter-spacing: 0.05em;
  }
  
  /* Clean, crisp, highly legible text for all notes & content */
  .desc-font, body, p, li, td, th {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    font-size: 1.05rem;
    line-height: 1.65;
    color: var(--text-soft);
  }
  
  /* Clear, bold, readable headers */
  h1, h2, h3, h4 {
    font-family: 'Outfit', 'Plus Jakarta Sans', sans-serif;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--light-magenta);
    text-shadow: 0 2px 8px rgba(254, 110, 240, 0.3);
    line-height: 1.25;
  }
  
  h1 { font-size: 2.2rem; }
  h2 { font-size: 1.7rem; }
  h3 { font-size: 1.3rem; }
  
  /* ===== ARCADE STATUS BAR ===== */
  .status-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #000000;
    border-bottom: 4px solid var(--retro-blue);
    z-index: 1000;
    padding: 0.75rem 1.2rem;
    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
  }
  
  .status-bar-inner {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  
  .status-item {
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--text-white);
  }
  
  .val-gold { color: var(--gold); }
  .val-pink { color: var(--light-magenta); }
  .val-green { color: var(--neon-green); }

  .app-container {
    max-width: 980px;
    margin: 0 auto;
    padding: 1.2rem;
    padding-top: 86px;
    padding-bottom: 8rem;
  }

  /* ===== RETRO HOME HERO ===== */
  .home-hero {
    background: var(--panel-nightlife);
    border: var(--pixel-border);
    border-radius: 12px;
    padding: 2.2rem 1.5rem;
    text-align: center;
    box-shadow: 0 0 25px rgba(241, 3, 147, 0.25);
    margin-bottom: 2rem;
  }

  .home-hero h1 {
    color: var(--gold);
    text-shadow: 2px 2px 0px var(--velvety);
    margin-bottom: 0.6rem;
  }

  .home-hero-sub {
    font-size: 1.1rem;
    color: var(--text-soft);
    max-width: 650px;
    margin: 0 auto 1.5rem;
  }

  /* ===== STAGE CARDS GRID ===== */
  .stage-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.2rem;
  }

  @media (max-width: 720px) {
    .stage-grid { grid-template-columns: 1fr; }
  }

  .stage-card {
    background: var(--panel-nightlife);
    border: 3px solid var(--velvety);
    border-radius: 10px;
    padding: 1.4rem;
    transition: all 0.2s ease;
    cursor: pointer;
    position: relative;
  }

  .stage-card:hover {
    border-color: var(--gold);
    transform: translateY(-3px);
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
  }

  .stage-card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.8rem;
  }

  .stage-world-num {
    font-size: 0.7rem;
    color: var(--gold);
    background: rgba(0,0,0,0.4);
    padding: 0.3rem 0.6rem;
    border-radius: 4px;
    border: 1px solid var(--velvety);
  }

  .stage-emoji { font-size: 1.8rem; }

  .stage-card h3 {
    color: var(--light-magenta);
    margin-bottom: 0.4rem;
    font-size: 1.2rem;
  }

  .stage-card-sub {
    font-size: 0.95rem;
    color: var(--text-soft);
    line-height: 1.5;
    margin-bottom: 1.2rem;
  }

  .stage-card-foot {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 0.8rem;
    border-top: 2px solid rgba(255,255,255,0.1);
  }

  .stage-count {
    font-size: 0.7rem;
    color: var(--retro-blue);
  }

  .stage-status {
    font-size: 0.65rem;
    background: var(--neon-green);
    color: #000;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-weight: 800;
  }

  /* ===== BUTTONS ===== */
  .retro-btn, .retry-btn {
    background: var(--lingonberries);
    color: var(--text-white);
    padding: 0.6rem 1.2rem;
    border-radius: 6px;
    border: 2px solid var(--light-magenta);
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .retro-btn:hover, .retry-btn:hover {
    background: var(--hot-pink);
    box-shadow: 0 0 15px var(--light-magenta);
    transform: scale(1.03);
  }

  /* ===== LESSON CONTAINER & CALLOUTS ===== */
  .lesson {
    background: var(--panel-nightlife);
    border: 2px solid var(--retro-blue);
    border-radius: 10px;
    padding: 1.6rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }

  .lesson-head {
    border-bottom: 2px solid var(--velvety);
    padding-bottom: 0.8rem;
    margin-bottom: 1.2rem;
  }

  .lesson-num {
    font-size: 0.75rem;
    color: var(--gold);
    margin-bottom: 0.3rem;
  }

  .lesson-body p { margin-bottom: 0.8rem; color: var(--text-white); }
  .lesson-body ul, .lesson-body ol { margin: 0.6rem 0 1rem 1.4rem; }
  .lesson-body li { margin-bottom: 0.4rem; color: var(--text-soft); }
  .lesson-body strong { color: var(--gold); }

  .callout {
    border-radius: 8px;
    padding: 1.1rem;
    margin: 1.2rem 0;
    font-size: 0.98rem;
    border-left: 4px solid;
  }

  .callout-example {
    background: rgba(255, 215, 0, 0.12);
    border-left-color: var(--gold);
    color: #fff;
  }
  
  .callout-tip {
    background: rgba(254, 110, 240, 0.12);
    border-left-color: var(--light-magenta);
    color: #fff;
  }

  .callout-head {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;

  }

  .callout-example .callout-head { color: var(--gold); }
  .callout-tip .callout-head { color: var(--light-magenta); }

  /* ===== TABLES ===== */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 0.95rem;
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--velvety);
  }

  th, td {
    padding: 0.75rem 0.9rem;
    border: 1px solid rgba(255,255,255,0.15);
    text-align: left;
    color: var(--text-white);
  }

  th {
    background: rgba(203, 100, 53, 0.3);
    color: var(--gold);
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
  }

  /* ===== MCQ PRACTICE CARDS ===== */
  .mcq-card {
    background: rgba(0,0,0,0.4);
    border: 2px dashed var(--retro-blue);
    border-radius: 8px;
    padding: 1.4rem;
    margin-top: 1.4rem;
  }

  .q-text {
    font-family: 'Outfit', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .q-options {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .opt {
    background: var(--panel-nightlife);
    border: 2px solid var(--velvety);
    border-radius: 6px;
    padding: 0.8rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 0.98rem;
    text-align: left;
    color: var(--text-white);
    display: flex;
    align-items: center;
    gap: 0.8rem;
    width: 100%;
    line-height: 1.45;
  }

  .opt:hover:not(:disabled) {
    border-color: var(--gold);
    background: rgba(255, 215, 0, 0.1);
    transform: translateX(4px);
  }

  .opt-letter {
    width: 26px;
    height: 26px;
    border-radius: 4px;
    background: var(--lingonberries);
    color: var(--gold);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    flex-shrink: 0;
  }

  .opt.correct {
    background: rgba(57, 255, 20, 0.2) !important;
    border-color: var(--neon-green) !important;
    color: var(--neon-green) !important;
    font-weight: 600;
  }
  .opt.correct .opt-letter { background: var(--neon-green); color: #000; }

  .opt.wrong {
    background: rgba(255, 49, 49, 0.2) !important;
    border-color: var(--neon-red) !important;
    color: var(--neon-red) !important;
  }
  .opt.wrong .opt-letter { background: var(--neon-red); color: #fff; }

  .feedback {
    margin-top: 1rem;
    padding: 1rem;
    border-radius: 6px;
    font-size: 0.98rem;
    line-height: 1.55;
    display: none;
  }

  .feedback.show { display: block; }
  .feedback.good { background: rgba(57, 255, 20, 0.15); color: var(--neon-green); border: 1px solid var(--neon-green); }
  .feedback.bad { background: rgba(255, 49, 49, 0.15); color: var(--neon-red); border: 1px solid var(--neon-red); }

  .feedback-head {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    margin-bottom: 0.3rem;
  }
</style>
</head>

o Information:</strong> 54% of users research products on social media before purchasing.</li>\n              <li><strong>Brand Interactions:</strong> Enables direct communication; 79% of consumers expect brands to respond within 24 hours.</li>\n              <li><strong>Personalized Experiences:</strong> Algorithms provide tailored content and recommendations; Epsilon reports 80% of consumers are more likely to purchase when offered personalized experiences.</li>\n              <li><strong>Community Building:</strong> Fosters connection with like-minded individuals, increasing customer retention by nearly 20%.</li>\n            </ul>\n      </div>\n      \n      \n      \n        <div class=\"callout callout-tip\">\n          <div class=\"callout-head\">\ud83c\udfaf SECTION SUMMARY & KEY EXAM TAKEAWAYS</div>\n          <ul style=\"margin: 0.3em 0 0 1.2em;\">\n            <li>Mobile usage dictates content format: content must be native and localized.</li><li>Personalized experiences drive 80% higher purchase likelihood.</li><li>68% of consumers with positive social experiences act as organic brand advocates.</li>\n          </ul>\n        </div>\n    </div>",

function updateStatusBar() {
  document.getElementById('statScore').innerText = String(gameState.score).padStart(5, '0');
  document.getElementById('statCoins').innerText = 'x' + String(gameState.coins).padStart(2, '0');
  document.getElementById('statStreak').innerText = String(gameState.streak).padStart(2, '0');
  document.getElementById('statLives').innerText = '❤️'.repeat(gameState.lives) || '💀';
}

function renderHome() {
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('moduleView').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  
  const grid = document.getElementById('modulesGrid');
  grid.innerHTML = '';
  
  MODULE_META.forEach(m => {
    const card = document.createElement('div');
    card.className = 'stage-card';
    card.onclick = () => renderModule(m.id);
    card.innerHTML = `
      <div class="stage-card-head">
        <span class="stage-world-num retro-font">WORLD ${m.id}</span>
        <span class="stage-emoji">${m.emoji}</span>
      </div>
      <h3>${m.title}</h3>
      <div class="stage-card-sub">${m.sub}</div>
      <div class="stage-card-foot">
        <span class="stage-count retro-font">${m.count} SECTIONS</span>
        <span class="stage-status retro-font">PLAY</span>
      </div>
    `;
    grid.appendChild(card);
  });
  
  updateStatusBar();
}

function renderModule(mId) {
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('moduleView').style.display = 'block';
  document.getElementById('backBtn').style.display = 'inline-block';
  
  const meta = MODULE_META.find(x => x.id === mId);
  const hero = document.getElementById('moduleHero');
  hero.innerHTML = `
    <div style="background:var(--panel-nightlife); border:2px solid var(--retro-blue); border-radius:10px; padding:1.5rem; text-align:center; margin-bottom:1.5rem;">
      <h2 style="color:var(--gold); font-size:1.8rem; margin-bottom:0.4rem;">${meta.title}</h2>
      <p style="color:var(--text-soft); font-size:1.05rem;">${meta.sub}</p>
    </div>
  `;
  
  const container = document.getElementById('lessonsContainer');
  container.innerHTML = '';
  
  for (let l = 1; l <= meta.count; l++) {
    const key = `m${mId}_l${l}`;
    const lessonData = window.LESSONS_DATA[key];
    if (!lessonData) continue;
    
    const card = document.createElement('div');
    card.className = 'lesson';
    
    let mcqHtml = '';
    if (lessonData.q && lessonData.q.length > 0) {
      lessonData.q.forEach((qObj, qIdx) => {
        const letters = ['A', 'B', 'C', 'D'];
        let optsHtml = '';
        qObj.o.forEach((optText, oIdx) => {
          optsHtml += `
            <button class="opt" onclick="checkAnswer(this, ${qObj.a}, '${qObj.e.replace(/'/g, "\'")}')">
              <span class="opt-letter">${letters[oIdx]}</span>
              <span>${optText}</span>
            </button>
          `;
        });
        
        mcqHtml += `
          <div class="mcq-card">
            <div class="q-text">Q${qIdx + 1}: ${qObj.q}</div>
            <div class="q-options">${optsHtml}</div>
            <div class="feedback"></div>
          </div>
        `;
      });
    }
    
    card.innerHTML = `
      <div class="lesson-head">
        <div class="lesson-num retro-font">WORLD ${mId}-${l}</div>
        <h2>${lessonData.t}</h2>
      </div>
      ${lessonData.b}
      ${mcqHtml}
    `;
    
    container.appendChild(card);
  }
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function checkAnswer(btnEl, correctIdx, explanation) {
  const container = btnEl.closest('.q-options');
  const buttons = container.querySelectorAll('.opt');
  const feedbackEl = container.nextElementSibling;
  
  buttons.forEach(b => b.disabled = true);
  
  const selectedIdx = Array.from(buttons).indexOf(btnEl);
  
  if (selectedIdx === correctIdx) {
    btnEl.classList.add('correct');
    gameState.score += 100;
    gameState.coins += 1;
    gameState.streak += 1;
    feedbackEl.className = 'feedback show good';
    feedbackEl.innerHTML = `<div class="feedback-head">✨ EXCELLENT! (+100 PTS)</div><div>${explanation}</div>`;
  } else {
    btnEl.classList.add('wrong');
    buttons[correctIdx].classList.add('correct');
    gameState.streak = 0;
    if (gameState.lives > 0) gameState.lives -= 1;
    feedbackEl.className = 'feedback show bad';
    feedbackEl.innerHTML = `<div class="feedback-head">❌ INCORRECT!</div><div>${explanation}</div>`;
  }
  
  updateStatusBar();
}

window.onload = function() {
  renderHome();
